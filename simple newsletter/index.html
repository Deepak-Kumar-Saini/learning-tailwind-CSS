<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Newsletter</title>
</head>

<body class="flex justify-center items-center h-[100vh] w-[100vw] p-5">

    <div class="bg-gray-900 p-5 rounded-xl">
            <h2 class="text-4xl font-semibold text-white">
                Subscribe to our newsletter
            </h2>
            <p class="mt-4 text-lg text-gray-300">
                Lorem ipsum dolor sit, amet consectetur adipisicing elit.
                 Pariatur nobis deleniti libero cupiditate ex a
            </p>
            <div class="mt-6 flex max-w-md gap-x-4">
                <input type="email" name="email" required placeholder="Enter your email"
                    class="min-w-0 flex-auto rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                <button type="submit"
                    class="flex-none rounded-md bg-indigo-500 px-3.5 py-2.5 text-sm font-semibold text-white shadow-xs hover:bg-indigo-400 ">Subscribe</button>
            </div>
    </div>
</body>

</html>
